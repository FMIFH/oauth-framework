version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: oauth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  as:
    build:
      context: .
      dockerfile: Dockerfile.as
    container_name: oauth-as
    ports:
      - "8000:8000"
    environment:
      OAUTH_POSTGRES_DSN: postgresql+asyncpg://postgres:password@postgres:5432/oauth
      OAUTH_REDIS_DSN: redis://redis:6379/0
      OAUTH_MASTER_ENCRYPTION_KEY: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile.as
    container_name: oauth-db-migrate
    entrypoint: ["python", "migrate.py", "upgrade", "head"]
    environment:
      OAUTH_POSTGRES_DSN: postgresql+asyncpg://postgres:password@postgres:5432/oauth
      OAUTH_REDIS_DSN: redis://redis:6379/0
      OAUTH_MASTER_ENCRYPTION_KEY: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
    depends_on:
      - postgres

  key-rotation-worker:
    build:
      context: .
      dockerfile: Dockerfile.as
    container_name: oauth-key-rotation-worker
    entrypoint: ["python", "scripts/worker.py"]
    environment:
      OAUTH_POSTGRES_DSN: postgresql+asyncpg://postgres:password@postgres:5432/oauth
      OAUTH_REDIS_DSN: redis://redis:6379/0
      OAUTH_MASTER_ENCRYPTION_KEY: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
